<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" width="100%" role="img" aria-label="Zielgruppen & Rollen">
  <style>
    .col{fill:#fff;stroke:#d9d4cc;stroke-width:1.5}
    .head{font:700 14px system-ui,sans-serif;fill:#fff;text-anchor:middle}
    .li{font:12px system-ui,sans-serif;fill:#3a3730}
    .cap{fill:#1F1F24}
  </style>
  <g>
    <rect class="col cap" x="20"  y="20" width="170" height="34" rx="8"/><text class="head" x="105" y="42">Entwickler</text>
