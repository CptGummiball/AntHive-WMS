    <text class="li" x="219" y="84">• Deployment/Config</text><text class="li" x="219" y="106">• Rechte-Katalog</text><text class="li" x="219" y="128">• Bereiche & Tags</text><text class="li" x="219" y="150">• Strategien</text><text class="li" x="219" y="172">• Metriken/Alerts</text><text class="li" x="219" y="194">• Webhooks</text>

    <rect class="col cap" x="390" y="20" width="170" height="34" rx="8"/><text class="head" x="475" y="42">Mandanten-Admin</text>
