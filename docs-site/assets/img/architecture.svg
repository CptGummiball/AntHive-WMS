<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="100%" role="img" aria-label="Systemarchitektur">
  <style>
    .box{fill:#fff;stroke:#d9d4cc;stroke-width:1.5;rx:10}
    .t{font:600 14px system-ui,sans-serif;fill:#1F1F24}
    .s{font:12px system-ui,sans-serif;fill:#6b665c}
    .lane{font:700 12px system-ui,sans-serif;fill:#8a8378;letter-spacing:.06em}
    .accent{fill:#FBF3E4;stroke:#D99322}
    .anthra{fill:#1F1F24}
    .wt{font:600 14px system-ui,sans-serif;fill:#fff}
    .arr{stroke:#b9b2a6;stroke-width:2;fill:none;marker-end:url(#a)}
  </style>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b9b2a6"/></marker></defs>

  <text x="20" y="30" class="lane">CLIENTS</text>
  <rect class="box" x="20" y="42" width="150" height="52" rx="10"/><text x="34" y="66" class="t">Desktop-Verwaltung</text><text x="34" y="83" class="s">React SPA</text>
  <rect class="box" x="20" y="104" width="150" height="52" rx="10"/><text x="34" y="128" class="t">Packplatz (Tablet)</text><text x="34" y="145" class="s">React SPA</text>
  <rect class="box" x="20" y="166" width="150" height="52" rx="10"/><text x="34" y="190" class="t">Scanner (MDE)</text><text x="34" y="207" class="s">React SPA</text>

  <path class="arr" d="M170 68 H250"/><path class="arr" d="M170 130 H250"/><path class="arr" d="M170 192 H250"/>

  <text x="255" y="30" class="lane">BACKEND – NestJS (API-first)</text>
  <rect class="box accent" x="255" y="42" width="330" height="250" rx="12"/>
  <text x="272" y="66" class="t">REST-API · JWT/API-Key · RBAC</text>
  <text x="272" y="90" class="s">Module: Catalog · Warehouse · Inbound · Orders ·</text>
  <text x="272" y="108" class="s">Reservation · Picking · Shipping · Returns ·</text>
  <text x="272" y="126" class="s">Internal (Umlagerung) · Quality · Handling Units ·</text>
  <text x="272" y="144" class="s">Analytics · Optimization · Labor · Billing · Tracking ·</text>
  <text x="272" y="162" class="s">Notifications · Realtime (SSE) · Settings · Identity</text>
  <rect class="box" x="272" y="180" width="140" height="44" rx="8"/><text x="286" y="200" class="t">Audit + Outbox</text><text x="286" y="216" class="s">append-only</text>
  <rect class="box" x="424" y="180" width="146" height="44" rx="8"/><text x="438" y="200" class="t">Interceptor</text><text x="438" y="216" class="s">Trace · Metrics</text>
  <rect class="box" x="272" y="234" width="298" height="42" rx="8"/><text x="286" y="259" class="s">LoggingInterceptor → Prozess-Tracking + /metrics</text>

  <path class="arr" d="M585 150 H660"/>
  <text x="665" y="30" class="lane">DATEN</text>
  <rect class="box anthra" x="665" y="120" width="170" height="60" rx="12"/><text x="685" y="148" class="wt">PostgreSQL 16</text><text x="685" y="167" class="s" fill="#c9c3b8">Prisma ORM · Migrationen</text>

  <path class="arr" d="M585 250 H665"/>
  <rect class="box" x="665" y="232" width="170" height="48" rx="10"/><text x="681" y="253" class="t">Webhooks</text><text x="681" y="270" class="s">HMAC · Scheduler</text>

  <path class="arr" d="M585 205 H665"/>
  <rect class="box" x="665" y="188" width="170" height="38" rx="10"/><text x="681" y="212" class="t">Prometheus /metrics</text>
</svg>
